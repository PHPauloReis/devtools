<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
(function () {
  const repo = "/devtools";
  const { pathname, search, hash } = window.location;

  if (hash) {
    window.location.replace(repo + "/" + hash + search);
  } else {
    const path = pathname.replace(repo, "");
    window.location.replace(repo + "/#" + path + search);
  }
})();
</script>
</head>
</html>
